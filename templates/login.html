<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Backup Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <img src="../static/assets/icons/logo.png" alt="Logo">
    </div>

    <h4 class="text-center fw-bold mb-4">Backup Hub</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-danger p-3 mb-3 text-center" role="alert">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="mb-3">
            <label class="form-label small text-muted text-uppercase fw-bold">Usuário</label>
            <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required autocomplete="off">
        </div>
        <div class="mb-4">
            <label class="form-label small text-muted text-uppercase fw-bold">Senha</label>
            <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn btn-login">Entrar no Hub</button>
    </form>
</div>

</body>
</html>
